<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperYou - Nutrition Tracking App</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --text-light: #6b7280;
            --background: #ffffff;
            --background-alt: #f9fafb;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            margin: 20px;
            padding: 60px 40px;
            background: var(--background);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: var(--text-color);
        }
        
        .tagline {
            color: var(--text-light);
            font-size: 18px;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: var(--background-alt);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        
        .btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            color: var(--text-light);
            font-size: 14px;
        }
        
        .footer a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }
            
            .logo {
                font-size: 36px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SuperYou</div>
        <h1>Your Personal Nutrition Assistant</h1>
        <p class="tagline">Track meals, analyze nutrients, and achieve your health goals with AI-powered insights.</p>
        
        <div class="links">
            <a href="https://apps.apple.com/app/superyou" class="btn btn-primary">Download on App Store</a>
            <a href="/privacy" class="btn">Privacy Policy</a>
            <a href="/terms" class="btn">Terms of Service</a>
        </div>
        
        <div class="footer">
            <p>&copy; 2025 SuperYou. All rights reserved.</p>
	<p style="margin-top: 10px;">
				<a href="mailto:contact@superyou.life">contact@superyou.life</a>
				</p>
        </div>
    </div>
</body>
</html>
